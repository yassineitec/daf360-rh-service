# ── DAF360 HR Service — local developer profile ───────────────────────────────
# Activates with: SPRING_PROFILES_ACTIVE=local  (set in .env)
# Values are read from .env via DotenvEnvironmentPostProcessor.
# DO NOT COMMIT this file — it may contain developer-specific paths.
server:
  port: ${PORT:8082}

spring:
  datasource:
    url: "${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=DAF360_HR;encrypt=false;trustServerCertificate=true}"
    username: ${DB_USER:sa}
    password: "${DB_PASS:}"

  jpa:
    show-sql: true
    hibernate:
      # Schema managed manually via SSMS scripts in local dev
      ddl-auto: none

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: "${MAIL_USERNAME:}"
    password: "${MAIL_PASSWORD:}"

app:
  jwt-secret: ${JWT_SECRET:daf360-change-me-in-production-32chars}
  jwt-public-key-path: ${JWT_PUBLIC_KEY_PATH:}

logging:
  level:
    com.daf360: DEBUG
    org.hibernate.SQL: DEBUG
    "[org.hibernate.orm.jdbc.bind]": TRACE
