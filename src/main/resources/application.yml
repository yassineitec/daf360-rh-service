# ── DAF360 HR Service — application.yml ──────────────────────────────────────
spring:
  application:
    name: rh-service

  datasource:
    url: ${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=daf360_hr;encrypt=true;trustServerCertificate=true}
    username: ${DB_USER:sa}
    password: ${DB_PASS:Timesheetdev2026!**}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}

  mail:
    host: ${MAIL_HOST:smtp.office365.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB

  # Jackson date/time serialization is configured in JacksonConfig.java
  # (write-dates-as-timestamps was removed from Jackson 3.x SerializationFeature)
  jackson:
    deserialization:
      fail-on-unknown-properties: false

server:
  port: ${PORT:8888}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.daf360: INFO
    org.springframework.security: WARN

app:
  jwt-secret: ${JWT_SECRET:daf360-change-me-in-production-32chars}
  jwt-expiry-seconds: ${JWT_EXPIRY_SECONDS:3600}
  allowed-origins:
    - ${PORTAL_URL:http://localhost:8080}
    - ${RH_FRONTEND_URL:http://localhost:4201}
  storage-path:     ${STORAGE_PATH:./uploads/hr}
  hr-manager-email: ${HR_MANAGER_EMAIL:}
  finance-email:    ${FINANCE_EMAIL:}
  company-name:     ${COMPANY_NAME:DAF360}
  portal-url: ${PORTAL_URL:http://localhost:8080}
  mail-from: ${MAIL_FROM:noreply@daf360.com}

mail:
  enabled: ${MAIL_ENABLED:false}
  from: ${MAIL_FROM:noreply@daf360.com}

portal:
  url: ${PORTAL_URL:http://localhost:8080}
