server.port=8891

spring.datasource.url=jdbc:sqlserver://${DB_HOST}:${DB_PORT};databaseName=${DB_NAME};encrypt=false;trustServerCertificate=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Must be app.allowed-origins to bind to AppProperties.allowedOrigins (prefix "app").
# The old key app.cors.allowed-origins bound to nothing → CORS_ORIGINS was ignored in
# prod and only the localhost defaults were allowed → same-origin POSTs got 403 "Invalid CORS request".
app.allowed-origins=${CORS_ORIGINS}